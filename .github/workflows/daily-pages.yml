name: Daily CKB Talk Brief

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"
      timezone: "Asia/Shanghai"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install -e ".[ai]"

      - name: Generate daily brief
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CKB_TALK_RADAR_SITE_URL: ${{ vars.PAGES_SITE_URL }}
          CKB_TALK_RADAR_SITE_TITLE: ${{ vars.PAGES_SITE_TITLE }}
          CKB_TALK_RADAR_CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
        run: |
          python -m ckb_talk_radar \
            --hours 24 \
            --timezone Asia/Shanghai \
            --output-dir outputs \
            --max-pages 5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: outputs/latest

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
